<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POA&M ID Error</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8d7da;
            color: #721c24;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .error-container {
            text-align: center;
            border: 1px solid #f5c6cb;
            background-color: #f8d7da;
            padding: 20px;
            border-radius: 5px;
        }
        .error-title {
            font-size: 24px;
            font-weight: bold;
        }
        .error-message {
            font-size: 18px;
        }
    </style>
    <script>
        function getQueryParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                row: params.get('row'),
                first: params.get('first')
            };
        }

        function displayErrorInfo() {
            const { row, first } = getQueryParams();
            const errorMessage = document.getElementById('error-message');
            if (row && first) {
                errorMessage.textContent = `Duplicate POA&M ID detected in row ${row}. It first appeared in row ${first}. Please check the ID format and ensure each ID is unique.`;
            } else {
                errorMessage.textContent = 'Duplicate POA&M IDs detected. Please check the ID format and ensure each ID is unique.';
            }
        }

        window.onload = displayErrorInfo;
    </script>
</head>
<body>
    <div class="error-container">
        <div class="error-title">POA&M ID Error</div>
        <div class="error-message" id="error-message"></div>
    </div>
</body>
</html>
